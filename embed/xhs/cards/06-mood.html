<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>06 · 今日心情</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+SC:wght@400;500;600&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ede2c8; --paper:#f7efd9;
    --ink:#2a2010; --ink-soft:#5a4a30; --ink-faint:#8a7656;
    --wax:#8b2a1e; --gold:#b08d57; --accent:#c64a3a;
    --line:rgba(176,141,87,0.35);
    --c1:#8a9099; --c2:#b3a48a; --c3:#c9a988; --c4:#d97a6a; --c5:#c64a3a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    width:1242px;height:1656px;overflow:hidden;
    font-family:"Noto Serif SC",serif;color:var(--ink);
    background:radial-gradient(120% 90% at 50% 0%, #f1e6cb 0%, #e6d8b5 60%, #d6c59b 100%);
    position:relative;
  }
  body::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background-image:
      radial-gradient(rgba(80,55,20,0.06) 1px, transparent 1.4px),
      radial-gradient(rgba(80,55,20,0.04) 1px, transparent 1.2px);
    background-size:7px 7px,13px 13px;background-position:0 0,3px 5px;
    mix-blend-mode:multiply;opacity:.6;
  }

  .topbar{
    position:absolute;top:60px;left:90px;right:90px;
    display:flex;justify-content:space-between;align-items:center;
    font-family:"Cormorant Garamond",serif;font-style:italic;
    color:var(--ink-faint);font-size:22px;letter-spacing:.26em;text-transform:uppercase;
  }
  .topbar .num{font-style:normal;color:var(--wax);letter-spacing:.1em;font-weight:500}

  .big{
    position:absolute;left:90px;top:180px;right:90px;
    font-family:"Ma Shan Zheng",serif;
    font-size:142px;line-height:1.06;color:var(--ink);letter-spacing:.02em;
  }
  .big .em{color:var(--wax)}
  .deck{
    position:absolute;left:96px;top:510px;right:90px;
    font-family:"Noto Serif SC",serif;color:var(--ink-soft);
    font-size:30px;line-height:1.5;letter-spacing:.05em;font-weight:500;
  }
  .deck b{color:var(--wax);font-weight:600}

  /* 色带 */
  .strip-box{
    position:absolute;left:90px;right:90px;top:620px;
    background:var(--paper);
    border:1px solid rgba(90,74,48,0.32);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.7) inset,
      0 26px 50px -26px rgba(60,40,15,0.45);
    padding:50px 60px 56px;
  }
  .strip-head{
    display:flex;justify-content:space-between;align-items:baseline;
    padding-bottom:18px;border-bottom:1px solid var(--line);margin-bottom:50px;
  }
  .strip-head h3{
    font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:500;
    color:var(--wax);font-size:26px;letter-spacing:.3em;text-transform:uppercase;
  }
  .strip-head h3 b{
    font-family:"Noto Serif SC",serif;font-style:normal;font-weight:600;
    color:var(--ink);font-size:30px;letter-spacing:.06em;margin-left:14px;
  }
  .strip-head .date{
    font-family:"Cormorant Garamond",serif;font-style:italic;
    color:var(--ink-faint);font-size:22px;letter-spacing:.18em;
  }
  .strip-head .date b{color:var(--wax);font-style:normal}

  /* 渐变底带 */
  .gradient-rail{
    position:relative;height:14px;border-radius:8px;
    background:linear-gradient(90deg, var(--c1) 0%, var(--c2) 25%, var(--c3) 50%, var(--c4) 75%, var(--c5) 100%);
    opacity:.45;
    margin:0 60px 0;
  }

  .dots{
    position:absolute;left:60px;right:60px;top:50%;transform:translateY(-50%);
    display:flex;justify-content:space-between;align-items:center;
    pointer-events:none;
  }
  .dot-wrap{display:flex;flex-direction:column;align-items:center;width:140px}
  .dot{
    width:74px;height:74px;border-radius:50%;
    border:2px solid rgba(247,239,217,0.9);
    box-shadow:0 6px 12px -4px rgba(60,40,15,0.35), 0 0 0 1px rgba(60,40,15,0.18);
  }
  .dot.c1{background:radial-gradient(circle at 35% 35%, #b6bcc4, var(--c1))}
  .dot.c2{background:radial-gradient(circle at 35% 35%, #d3c8af, var(--c2))}
  .dot.c3{background:radial-gradient(circle at 35% 35%, #e4cfaf, var(--c3))}
  .dot.c4{background:radial-gradient(circle at 35% 35%, #f0a89c, var(--c4))}
  .dot.c5{background:radial-gradient(circle at 35% 35%, #df7d6e, var(--c5))}

  .dot-wrap.active .dot{
    width:120px;height:120px;
    border:3px solid var(--paper);
    box-shadow:
      0 0 0 1px rgba(60,40,15,0.35),
      0 0 0 8px rgba(139,42,30,0.08),
      0 16px 26px -8px rgba(139,42,30,0.4);
    transform:translateY(-4px);
  }

  /* 标签 */
  .labels{
    margin-top:60px;
    display:flex;justify-content:space-between;
    padding:0 20px;
  }
  .label{
    width:140px;text-align:center;
  }
  .label .cn{
    font-family:"Noto Serif SC",serif;font-weight:500;font-size:24px;
    color:var(--ink-soft);letter-spacing:.08em;
  }
  .label .en{
    font-family:"Cormorant Garamond",serif;font-style:italic;
    color:var(--ink-faint);font-size:18px;letter-spacing:.18em;margin-top:4px;
  }
  .label.active .cn{color:var(--wax);font-weight:600}
  .label.active .en{color:var(--accent)}

  /* 刻度数字 */
  .ticks{
    margin-top:24px;display:flex;justify-content:space-between;padding:0 60px;
    font-family:"Cormorant Garamond",serif;font-style:italic;
    color:var(--ink-faint);font-size:20px;letter-spacing:.2em;
  }
  .ticks span{width:140px;text-align:center}
  .ticks .active{color:var(--wax);font-weight:500}

  /* 当前选中提示 */
  .selected{
    margin-top:36px;text-align:center;padding-top:30px;
    border-top:1px dashed var(--line);
  }
  .selected .row{
    font-family:"Noto Serif SC",serif;font-size:24px;color:var(--ink-soft);
    letter-spacing:.1em;
  }
  .selected .row b{color:var(--wax);font-weight:600;margin:0 .2em}
  .selected .row em{color:var(--ink);font-style:normal;font-weight:600}
  .selected .small{
    margin-top:8px;
    font-family:"Cormorant Garamond",serif;font-style:italic;
    color:var(--ink-faint);font-size:20px;letter-spacing:.22em;
  }

  .corner{
    position:absolute;right:80px;bottom:60px;
    font-family:"Cormorant Garamond",serif;font-style:italic;
    color:var(--ink-faint);font-size:20px;letter-spacing:.28em;
    text-transform:uppercase;text-align:right;line-height:1.5;
  }
  .pageno{
    position:absolute;left:90px;bottom:60px;
    font-family:"Cormorant Garamond",serif;font-style:italic;
    color:var(--ink-faint);font-size:22px;letter-spacing:.28em;
  }
  .pageno b{color:var(--wax);font-weight:500;font-style:normal}
</style>
</head>
<body>
  <div class="topbar">
    <span>房间 · II · 心情档案</span>
    <span class="num">06 / 09</span>
  </div>

  <h1 class="big">
    她<span class="em">今天</span><br>
    怎么样？
  </h1>
  <div class="deck">一条色带，<b>从冷灰到火漆红</b>，一天点一颗。</div>

  <div class="strip-box">
    <div class="strip-head">
      <h3>Today · <b>今日</b></h3>
      <div class="date">MAY · <b>20</b> · 2026</div>
    </div>

    <div class="gradient-rail">
      <div class="dots">
        <div class="dot-wrap"><div class="dot c1"></div></div>
        <div class="dot-wrap"><div class="dot c2"></div></div>
        <div class="dot-wrap active"><div class="dot c3"></div></div>
        <div class="dot-wrap"><div class="dot c4"></div></div>
        <div class="dot-wrap"><div class="dot c5"></div></div>
      </div>
    </div>

    <div class="labels">
      <div class="label"><div class="cn">凉了</div><div class="en">cold</div></div>
      <div class="label"><div class="cn">闷闷的</div><div class="en">stuffy</div></div>
      <div class="label active"><div class="cn">还行</div><div class="en">okay</div></div>
      <div class="label"><div class="cn">暖暖的</div><div class="en">warm</div></div>
      <div class="label"><div class="cn">心动了</div><div class="en">aflame</div></div>
    </div>

    <div class="ticks">
      <span>01</span><span>02</span><span class="active">03</span><span>04</span><span>05</span>
    </div>

    <div class="selected">
      <div class="row">她今天选了 <b>03 · 还行</b> · <em>没说原因</em></div>
    </div>
  </div>

  <div class="pageno">No. <b>06</b> · MOOD</div>
  <div class="corner">THE MUSEUM OF US<br>A 520 Project</div>
</body>
</html>
