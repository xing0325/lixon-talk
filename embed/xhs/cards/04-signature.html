<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>04 · 签名</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+SC:wght@400;500;600&family=Ma+Shan+Zheng&family=Liu+Jian+Mao+Cao&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ede2c8; --paper:#f7efd9;
    --ink:#2a2010; --ink-soft:#5a4a30; --ink-faint:#8a7656;
    --wax:#8b2a1e; --gold:#b08d57; --accent:#c64a3a;
    --line:rgba(176,141,87,0.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    width:1242px;height:1656px;overflow:hidden;
    font-family:"Noto Serif SC",serif;color:var(--ink);
    background:radial-gradient(120% 90% at 50% 0%, #f1e6cb 0%, #e6d8b5 60%, #d6c59b 100%);
    position:relative;
  }
  body::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background-image:
      radial-gradient(rgba(80,55,20,0.06) 1px, transparent 1.4px),
      radial-gradient(rgba(80,55,20,0.04) 1px, transparent 1.2px);
    background-size:7px 7px,13px 13px;background-position:0 0,3px 5px;
    mix-blend-mode:multiply;opacity:.6;
  }

  .topbar{
    position:absolute;top:60px;left:90px;right:90px;
    display:flex;justify-content:space-between;align-items:center;
    font-family:"Cormorant Garamond",serif;font-style:italic;
    color:var(--ink-faint);font-size:22px;letter-spacing:.26em;text-transform:uppercase;
  }
  .topbar .num{font-style:normal;color:var(--wax);letter-spacing:.1em;font-weight:500}

  .big{
    position:absolute;left:90px;top:170px;right:90px;
    font-family:"Ma Shan Zheng",serif;
    font-size:132px;line-height:1.08;color:var(--ink);letter-spacing:.02em;
  }
  .big .eq{
    display:inline-block;
    font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:500;
    color:var(--wax);font-size:152px;margin:0 .08em;vertical-align:-10px;
  }
  .big .ans{color:var(--wax)}
  /* "信件读完之后" 视觉过渡 */
  .letter-end-cue{
    position:absolute;left:90px;right:90px;top:470px;
    text-align:center;
  }
  .le-dots{
    font-family:"Ma Shan Zheng","KaiTi",serif;
    font-size:30px;color:var(--ink-soft);letter-spacing:.18em;
  }
  .le-line{
    height:1px;background:var(--line);margin:18px 140px;
  }
  .le-label{
    font-family:"Cormorant Garamond",serif;font-style:italic;
    color:var(--ink-faint);font-size:20px;letter-spacing:.32em;
    text-transform:uppercase;
  }
  .le-arrow{
    font-family:"Cormorant Garamond",serif;
    color:var(--wax);font-size:32px;line-height:1;margin:6px 0 2px;
  }
  .le-sub{
    font-family:"Noto Serif SC",serif;font-weight:500;
    color:var(--ink-soft);font-size:20px;letter-spacing:.08em;margin-top:4px;
  }

  /* 签名画布 */
  .canvas{
    position:absolute;left:90px;right:90px;top:660px;
    background:var(--paper);
    border:1px solid rgba(90,74,48,0.35);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.7) inset,
      0 30px 60px -28px rgba(60,40,15,0.45),
      0 14px 26px -14px rgba(60,40,15,0.3);
    padding:40px 60px 50px;
  }
  .canvas .head{
    display:flex;justify-content:space-between;align-items:center;
    border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:30px;
  }
  .canvas .head h3{
    font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:500;
    color:var(--wax);font-size:24px;letter-spacing:.32em;text-transform:uppercase;
  }
  .canvas .head .tag{
    font-family:"Noto Serif SC",serif;font-size:18px;color:var(--ink-faint);
    letter-spacing:.16em;
  }
  .canvas .label{
    font-family:"Noto Serif SC",serif;font-size:22px;color:var(--ink-soft);
    letter-spacing:.1em;margin-bottom:14px;
  }
  .canvas .label b{color:var(--wax);font-weight:500}

  .sig-area{
    position:relative;height:230px;
    background:
      linear-gradient(180deg, rgba(247,239,217,1), rgba(247,239,217,0.6)),
      repeating-linear-gradient(180deg, transparent 0 39px, rgba(139,42,30,0.1) 39px 40px);
    border:1px dashed var(--line);
  }
  .sig-area .base{
    position:absolute;left:60px;right:60px;bottom:50px;height:1px;
    background:repeating-linear-gradient(90deg, var(--ink-faint) 0 8px, transparent 8px 14px);
    opacity:.55;
  }
  .sig-area .x{
    position:absolute;left:50px;bottom:46px;
    font-family:"Cormorant Garamond",serif;font-style:italic;
    color:var(--ink-faint);font-size:30px;letter-spacing:.2em;
  }
  /* 手写签名 - 用 Liu Jian Mao Cao */
  .sig{
    position:absolute;left:140px;bottom:50px;
    font-family:"Liu Jian Mao Cao","Ma Shan Zheng",cursive;
    font-size:130px;color:var(--ink);
    line-height:1;letter-spacing:.06em;
    transform:rotate(-3deg) translateY(20px);
    text-shadow:0 1px 0 rgba(255,250,230,0.5);
  }
  .sig .ink{
    background:linear-gradient(180deg,#1c1408,#2a2010 50%,#3c2e15);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  /* 毛笔起笔／落笔的飞白 */
  .sig::after{
    content:"";position:absolute;left:-30px;top:50%;width:50px;height:8px;
    background:linear-gradient(90deg, rgba(42,32,16,0.6) 0%, transparent 100%);
    border-radius:50%;transform:translateY(-50%) rotate(-12deg);opacity:.7;
  }

  /* 时间戳 */
  .stamp-tx{
    position:absolute;right:60px;bottom:30px;
    font-family:"Cormorant Garamond",serif;font-style:italic;
    color:var(--ink-faint);font-size:22px;letter-spacing:.2em;
  }
  .stamp-tx b{color:var(--wax);font-style:normal;font-weight:500;letter-spacing:.1em}

  /* 按钮 */
  .actions{
    margin-top:30px;display:flex;gap:18px;align-items:center;
  }
  .btn{
    flex:1;text-align:center;padding:22px 0;
    font-family:"Noto Serif SC",serif;font-weight:500;font-size:24px;
    letter-spacing:.2em;
    background:var(--wax);color:#f3e0c8;
    border:1px solid #5b1a12;
    box-shadow:
      0 1px 0 rgba(255,200,170,0.18) inset,
      0 -2px 0 rgba(0,0,0,0.25) inset,
      0 10px 18px -8px rgba(139,42,30,0.5);
    position:relative;
  }
  .btn.ghost{
    background:transparent;color:var(--ink-soft);border:1px solid var(--gold);
    box-shadow:none;
  }
  .btn small{display:block;font-size:14px;letter-spacing:.3em;opacity:.7;margin-top:4px;font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:400}

  /* 留言备选 */
  .note-box{
    margin-top:24px;padding:20px 24px;
    border:1px solid var(--line);
    background:repeating-linear-gradient(180deg,
      rgba(247,239,217,0.8) 0 35px,
      rgba(139,42,30,0.04) 35px 36px);
    color:var(--ink-faint);
    font-family:"Noto Serif SC",serif;font-size:20px;line-height:1.7;
    letter-spacing:.05em;
    position:relative;
  }
  .note-box::before{
    content:"或者 · OR";
    position:absolute;left:50%;top:-12px;transform:translateX(-50%);
    background:var(--bg);padding:0 14px;
    font-family:"Cormorant Garamond",serif;font-style:italic;
    color:var(--gold);font-size:18px;letter-spacing:.3em;
  }
  .note-box .ph{color:var(--ink-faint);opacity:.7;font-style:italic}

  .corner{
    position:absolute;right:80px;bottom:60px;
    font-family:"Cormorant Garamond",serif;font-style:italic;
    color:var(--ink-faint);font-size:20px;letter-spacing:.28em;
    text-transform:uppercase;text-align:right;line-height:1.5;
  }
  .pageno{
    position:absolute;left:90px;bottom:60px;
    font-family:"Cormorant Garamond",serif;font-style:italic;
    color:var(--ink-faint);font-size:22px;letter-spacing:.28em;
  }
  .pageno b{color:var(--wax);font-weight:500;font-style:normal}
</style>
</head>
<body>
  <div class="topbar">
    <span>第二步 · THE SIGNATURE</span>
    <span class="num">04 / 09</span>
  </div>

  <h1 class="big">
    签下你的名字<br>
    <span class="eq">=</span><span class="ans">答应</span>一起吃饭
  </h1>

  <!-- 让 reader 知道：签名是信的最后那一步 -->
  <div class="letter-end-cue">
    <div class="le-dots">⋯ 我会一直在 ⋯</div>
    <div class="le-line"></div>
    <div class="le-label">信件读到这里结束</div>
    <div class="le-arrow">↓</div>
    <div class="le-sub">下面这块画板，就是收件人的回应</div>
  </div>

  <div class="canvas">
    <div class="head">
      <h3>· 信件最末尾 · 签名画板 ·</h3>
      <span class="tag">PRIVATE · 仅你我可见</span>
    </div>
    <div class="label">如果你愿意来今晚的饭，把名字写在下面那条横线上。<b>就这一件事。</b></div>

    <div class="sig-area">
      <div class="base"></div>
      <div class="x">×</div>
      <div class="sig"><span class="ink">你的名字</span></div>
      <div class="stamp-tx">signed at <b>—— : ——</b></div>
    </div>

    <div class="actions">
      <div class="btn">签好了，今晚见<small>SUBMIT</small></div>
      <div class="btn ghost">还没想好<small>NOT YET</small></div>
    </div>

    <div class="note-box">
      <span class="ph">骂的、问的、想说的，都可以写在这里⋯⋯<br>不签也没关系，下面这一框是给你的，我每条都看。</span>
    </div>
  </div>

  <div class="pageno">No. <b>04</b> · SIGN</div>
  <div class="corner">THE MUSEUM OF US<br>A 520 Project</div>
</body>
</html>
